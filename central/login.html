<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — Acesso SME</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet" />
  <link href="estilo.css" rel="stylesheet" />
</head>
<body class="login-body">
  <div class="card-login">
    <div class="topo">
      <div class="ic"><i class="bi bi-shield-lock-fill"></i></div>
      <h3>ACESSO SME</h3>
      <div class="sub">Rede Municipal de Educação</div>
    </div>
    <div class="corpo">
      <p style="color:#475569;font-size:.9rem;margin-bottom:1.2rem">Entre com sua conta institucional para acessar os sistemas da rede.</p>

      <button id="btn-google" class="btn-google">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="" />
        Entrar com Google
      </button>

      <div id="msg" class="msg"></div>

      <!-- Empresas / fornecedores externos: entram por e-mail + senha (não usam
           conta Google). O acesso é cadastrado e governado pelo central. -->
      <div style="margin:18px 0 6px;text-align:center">
        <button id="btn-empresa-toggle" type="button"
                style="background:none;border:0;color:#0369a1;font-size:.85rem;font-weight:700;cursor:pointer;text-decoration:underline">
          <i class="bi bi-briefcase"></i> Sou empresa / fornecedor
        </button>
      </div>

      <form id="form-empresa" style="display:none;margin-top:6px">
        <input type="email" id="emp-email" placeholder="E-mail de acesso" autocomplete="username"
               style="width:100%;padding:10px 12px;margin-bottom:8px;border:1px solid #cbd5e1;border-radius:10px;font-size:.9rem" />
        <input type="password" id="emp-senha" placeholder="Senha" autocomplete="current-password"
               style="width:100%;padding:10px 12px;margin-bottom:10px;border:1px solid #cbd5e1;border-radius:10px;font-size:.9rem" />
        <button type="submit" id="btn-empresa"
                style="width:100%;padding:11px;border:0;border-radius:10px;background:#075f82;color:#fff;font-weight:800;font-size:.92rem;cursor:pointer">
          <i class="bi bi-box-arrow-in-right"></i> Entrar
        </button>
      </form>

      <div class="foot"><i class="bi bi-info-circle"></i> Use sua conta <b id="dom"></b></div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const CFG = window.ACESSO_CFG;
    document.getElementById('dom').textContent = CFG.dominio || '';
    const SB = window.ACESSO_SB || window.supabase.createClient(CFG.url, CFG.anonKey);
    window.ACESSO_SB = SB;

    function msg(texto, tipo) {
      const m = document.getElementById('msg');
      m.textContent = texto; m.className = 'msg ' + (tipo || 'info');
    }

    // Para onde ir depois de logar.
    //  - com ?next válido (uma página .html do /central/, ex.: admin.html) -> essa página
    //  - caso contrário -> PORTAL de sistemas (raiz do domínio)
    // 'index.html' como next é ignorado (o portal é a própria raiz).
    function destino() {
      const params = new URLSearchParams(location.search);
      const next = params.get('next');
      if (next) {
        // Caminho ABSOLUTO do mesmo domínio (ex.: /gom-sme/teste/) — volta à origem.
        // Só aceita se começar com uma única "/" (anti open-redirect: rejeita //host e esquemas).
        if (/^\/(?!\/)/.test(next)) return new URL(next, location.origin).href;
        // Página interna do /central/ (ex.: admin.html).
        if (next !== 'index.html' && /^[\w.\-]+\.html(\?[\w%=&.\-]*)?$/.test(next)) {
          return new URL(next, location.href).href;
        }
      }
      return new URL('../', location.href).href;      // padrão: portal de sistemas (raiz)
    }

    // Já logado? Vai direto ao destino.
    SB.auth.getSession().then(({ data }) => {
      if (data.session) location.replace(destino());
    });

    // ── Institucional (Google) ────────────────────────────────────────────────
    document.getElementById('btn-google').addEventListener('click', async () => {
      document.getElementById('msg').className = 'msg';
      // O token OAuth precisa voltar para ESTA página (login.html), que carrega o
      // cliente Supabase, para a sessão ser CONSUMIDA e PERSISTIDA antes de seguir.
      // Se mandarmos o redirectTo direto ao portal (sem cliente Supabase), o
      // #access_token nunca é consumido e a sessão SSO não é salva.
      // Após o retorno, o getSession() acima leva ao destino().
      const next = new URLSearchParams(location.search).get('next');
      const redirectTo = location.origin + location.pathname + (next ? '?next=' + encodeURIComponent(next) : '');
      const { error } = await SB.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo, queryParams: { prompt: 'select_account' } }
      });
      if (error) msg('Erro ao entrar: ' + error.message, 'erro');
    });

    // ── Empresa / fornecedor (e-mail + senha) ─────────────────────────────────
    document.getElementById('btn-empresa-toggle').addEventListener('click', () => {
      const f = document.getElementById('form-empresa');
      const mostrar = f.style.display === 'none';
      f.style.display = mostrar ? 'block' : 'none';
      if (mostrar) document.getElementById('emp-email').focus();
    });

    document.getElementById('form-empresa').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = (document.getElementById('emp-email').value || '').trim().toLowerCase();
      const senha = document.getElementById('emp-senha').value || '';
      if (!email || !senha) { msg('Informe e-mail e senha.', 'erro'); return; }
      const btn = document.getElementById('btn-empresa');
      btn.disabled = true;
      msg('Entrando…', 'info');
      const { error } = await SB.auth.signInWithPassword({ email, password: senha });
      if (error) {
        btn.disabled = false;
        msg('E-mail ou senha inválidos.', 'erro');
        return;
      }
      // Sessão criada e persistida pelo cliente; segue ao portal (ou ?next).
      location.replace(destino());
    });
  </script>
</body>
</html>
