<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — Acesso SME</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
  <style>
    body { font-family:'Inter',sans-serif; background:linear-gradient(135deg,#0f1117,#1a1f2e);
      min-height:100vh; display:grid; place-items:center; margin:0; padding:1rem; }
    .card-login { background:#fff; border-radius:20px; box-shadow:0 20px 60px rgba(0,0,0,.35);
      max-width:420px; width:100%; padding:2.6rem 2.2rem; text-align:center; }
    .brand { font-weight:900; color:#002b5e; font-size:1.5rem; letter-spacing:-.02em; }
    .sub { color:#64748b; font-size:.92rem; margin:.4rem 0 1.8rem; }
    .btn-google { display:inline-flex; align-items:center; justify-content:center; gap:.6rem;
      width:100%; padding:.8rem 1rem; border:1px solid #e2e8f0; border-radius:12px; background:#fff;
      color:#1e293b; font-weight:600; cursor:pointer; transition:.15s; font-size:.98rem; }
    .btn-google:hover { background:#f8fafc; border-color:#cbd5e1; box-shadow:0 4px 14px rgba(0,0,0,.08); }
    .dominio { color:#94a3b8; font-size:.78rem; margin-top:1.4rem; }
    .erro { color:#b91c1c; font-size:.85rem; margin-top:1rem; min-height:1.2rem; }
    .logo-ico { font-size:2.6rem; color:#4f8ef7; }
  </style>
</head>
<body>
  <div class="card-login">
    <div class="logo-ico"><i class="bi bi-shield-lock-fill"></i></div>
    <div class="brand">Acesso SME</div>
    <div class="sub">Portal único da rede municipal de educação</div>

    <button id="btn-google" class="btn-google">
      <i class="bi bi-google" style="color:#ea4335"></i> Entrar com Google
    </button>

    <div id="erro" class="erro"></div>
    <div class="dominio"><i class="bi bi-info-circle"></i> Use sua conta institucional <b id="dom"></b></div>
  </div>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const CFG = window.ACESSO_CFG;
    document.getElementById('dom').textContent = CFG.dominio || '';
    const SB = window.ACESSO_SB || window.supabase.createClient(CFG.url, CFG.anonKey);
    window.ACESSO_SB = SB;

    // Para onde ir depois de logar.
    //  - sem ?next  -> PORTAL (menu de sistemas na raiz: index.html)
    //  - com ?next  -> uma página .html da pasta /central/ (ex.: admin.html),
    //                  usada quando o super admin acessa o painel direto.
    function destino() {
      const params = new URLSearchParams(location.search);
      const next = params.get('next');
      if (next && /^[\w.\-]+\.html(\?[\w%=&.\-]*)?$/.test(next)) {
        return new URL(next, location.href).href;           // relativo a /central/
      }
      return new URL('../index.html', location.href).href;  // padrão: portal raiz
    }

    // Já logado? Vai direto ao destino.
    SB.auth.getSession().then(({ data }) => {
      if (data.session) location.replace(destino());
    });

    document.getElementById('btn-google').addEventListener('click', async () => {
      document.getElementById('erro').textContent = '';
      const { error } = await SB.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: destino(), queryParams: { prompt: 'select_account' } }
      });
      if (error) document.getElementById('erro').textContent = 'Erro ao entrar: ' + error.message;
    });
  </script>
</body>
</html>
