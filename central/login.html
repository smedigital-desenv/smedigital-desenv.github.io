<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar — Acesso SME</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet" />
  <link href="estilo.css" rel="stylesheet" />
</head>
<body class="login-body">
  <div class="card-login">
    <div class="topo">
      <div class="ic"><i class="bi bi-shield-lock-fill"></i></div>
      <h3>ACESSO SME</h3>
      <div class="sub">Rede Municipal de Educação</div>
    </div>
    <div class="corpo">
      <p style="color:#475569;font-size:.9rem;margin-bottom:1.2rem">Entre com sua conta institucional para acessar os sistemas da rede.</p>

      <button id="btn-google" class="btn-google">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="" />
        Entrar com Google
      </button>

      <div id="msg" class="msg"></div>

      <div class="foot"><i class="bi bi-info-circle"></i> Use sua conta <b id="dom"></b></div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const CFG = window.ACESSO_CFG;
    document.getElementById('dom').textContent = CFG.dominio || '';
    const SB = window.ACESSO_SB || window.supabase.createClient(CFG.url, CFG.anonKey);
    window.ACESSO_SB = SB;

    function msg(texto, tipo) {
      const m = document.getElementById('msg');
      m.textContent = texto; m.className = 'msg ' + (tipo || 'info');
    }

    // Para onde ir depois de logar.
    //  - sem ?next  -> PORTAL (menu de sistemas na raiz: index.html)
    //  - com ?next  -> uma página .html da pasta /central/ (ex.: admin.html)
    function destino() {
      const params = new URLSearchParams(location.search);
      const next = params.get('next');
      if (next && /^[\w.\-]+\.html(\?[\w%=&.\-]*)?$/.test(next)) {
        return new URL(next, location.href).href;           // relativo a /central/
      }
      return new URL('../index.html', location.href).href;  // padrão: portal raiz
    }

    // Já logado? Vai direto ao destino.
    SB.auth.getSession().then(({ data }) => {
      if (data.session) location.replace(destino());
    });

    document.getElementById('btn-google').addEventListener('click', async () => {
      document.getElementById('msg').className = 'msg';
      // O token OAuth precisa voltar para ESTA página (login.html), que carrega o
      // cliente Supabase, para a sessão ser CONSUMIDA e PERSISTIDA antes de seguir.
      // Se mandarmos o redirectTo direto ao portal (index.html renderizado do
      // README, sem cliente Supabase), o #access_token nunca é consumido e a
      // sessão SSO não é salva — todos os sistemas voltam ao login em loop.
      // Após o retorno, as linhas do getSession() acima levam ao destino().
      const next = new URLSearchParams(location.search).get('next');
      const redirectTo = location.origin + location.pathname + (next ? '?next=' + encodeURIComponent(next) : '');
      const { error } = await SB.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo, queryParams: { prompt: 'select_account' } }
      });
      if (error) msg('Erro ao entrar: ' + error.message, 'erro');
    });
  </script>
</body>
</html>
