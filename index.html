<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SME Digital — Portal de Sistemas | SME Ribeirão Preto</title>
  <meta name="description" content="Portal de sistemas da Secretaria Municipal de Educação de Ribeirão Preto." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg-1:#0f1117; --bg-2:#1a1f2e; --surface:#171b27; --surface-2:#1f2533;
      --text:#e4e6eb; --muted:#a8adbf; --faint:#6e7693;
      --accent:#4f8ef7; --accent2:#7c3aed;
      --border:#2a2f3e; --radius:16px;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }
    body {
      font-family:'DM Sans',sans-serif;
      background:linear-gradient(135deg,var(--bg-1) 0%,var(--bg-2) 100%);
      color:var(--text); min-height:100vh; min-height:100dvh;
      display:flex; flex-direction:column;
      -webkit-font-smoothing:antialiased;
    }
    body::before {
      content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
      background:
        radial-gradient(ellipse 50% 40% at 15% 10%,rgba(79,142,247,.10) 0%,transparent 70%),
        radial-gradient(ellipse 50% 50% at 85% 90%,rgba(124,58,237,.10) 0%,transparent 70%);
    }
    .wrap { width:100%; max-width:1100px; margin:0 auto; padding:48px 20px 32px; position:relative; z-index:1; flex:1; }

    /* Header */
    .header { text-align:center; margin-bottom:44px; animation:fade .5s ease both; }
    .logo {
      width:64px; height:64px; margin:0 auto 18px;
      background:linear-gradient(135deg,var(--accent),var(--accent2));
      border-radius:20px; display:flex; align-items:center; justify-content:center;
      box-shadow:0 10px 30px rgba(79,142,247,.28);
    }
    .logo svg { width:34px; height:34px; fill:none; stroke:#fff; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
    .header h1 { font-size:clamp(1.6rem,4vw,2.2rem); font-weight:700; letter-spacing:-.02em; }
    .header .sub { color:var(--muted); font-size:1rem; margin-top:8px; }
    .header .tag {
      display:inline-block; margin-top:14px; font-family:'DM Mono',monospace; font-size:.72rem;
      color:var(--faint); text-transform:uppercase; letter-spacing:.12em;
      border:1px solid var(--border); border-radius:999px; padding:5px 14px;
    }

    /* Grid */
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:18px; }
    .card {
      position:relative; display:flex; flex-direction:column;
      background:var(--surface); border:1px solid var(--border); border-radius:var(--radius);
      padding:24px; text-decoration:none; color:inherit; overflow:hidden;
      transition:transform .18s ease, border-color .18s ease, box-shadow .18s ease, background .18s ease;
      animation:fadeUp .5s ease both;
    }
    .card::after {
      content:''; position:absolute; inset:0 0 auto 0; height:3px;
      background:linear-gradient(90deg,var(--accent),var(--accent2)); opacity:0; transition:opacity .18s ease;
    }
    .card:hover {
      transform:translateY(-4px); background:var(--surface-2);
      border-color:rgba(79,142,247,.45); box-shadow:0 14px 34px rgba(0,0,0,.35);
    }
    .card:hover::after { opacity:1; }
    .card-icon {
      width:48px; height:48px; border-radius:13px; display:flex; align-items:center; justify-content:center;
      font-size:24px; background:rgba(79,142,247,.10); border:1px solid rgba(79,142,247,.18); margin-bottom:16px;
    }
    .card h3 { font-size:1.12rem; font-weight:600; margin-bottom:6px; }
    .card .badge {
      font-family:'DM Mono',monospace; font-size:.66rem; color:var(--faint);
      text-transform:uppercase; letter-spacing:.1em; margin-bottom:10px;
    }
    .card p { color:var(--muted); font-size:.9rem; line-height:1.55; flex:1; }
    .card .go {
      margin-top:16px; display:inline-flex; align-items:center; gap:6px;
      font-size:.85rem; font-weight:600; color:var(--accent);
    }
    .card .go svg { width:15px; height:15px; transition:transform .18s ease; }
    .card:hover .go svg { transform:translateX(4px); }

    /* Footer */
    .footer { text-align:center; padding:28px 20px; color:var(--faint); font-size:.82rem; position:relative; z-index:1; border-top:1px solid var(--border); }
    .footer span { font-family:'DM Mono',monospace; }

    @keyframes fade { from{opacity:0} to{opacity:1} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
    .card:nth-child(1){animation-delay:.05s} .card:nth-child(2){animation-delay:.10s}
    .card:nth-child(3){animation-delay:.15s} .card:nth-child(4){animation-delay:.20s}
    .card:nth-child(5){animation-delay:.25s} .card:nth-child(6){animation-delay:.30s}
    .card:nth-child(7){animation-delay:.35s} .card:nth-child(8){animation-delay:.40s}
    @media (prefers-reduced-motion: reduce){ *{animation:none!important;transition:none!important} }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="header">
      <div class="logo">
        <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
      </div>
      <h1>Portal de Sistemas</h1>
      <p class="sub">Secretaria Municipal de Educação · Ribeirão Preto</p>
      <span class="tag">smedigital.com.br</span>
    </header>

    <main class="grid" id="grid"></main>
  </div>

  <footer class="footer">
    <p>Secretaria Municipal de Educação — Ribeirão Preto, SP · <span>SME Digital</span></p>
  </footer>

  <script>
    const sistemas = [
      {
        nome: 'MAPA',
        badge: 'Monitoramento',
        desc: 'Monitoramento de aprendizagem e acompanhamento dos projetos alfabetizadores da rede.',
        icon: '🗺️',
        url: '/mapa-sme/'
      },
      {
        nome: 'GOM',
        badge: 'Obras e Manutenção',
        desc: 'Sistema de chamados da Gerência de Obras e Manutenção das unidades escolares.',
        icon: '🔧',
        url: '/gom-sme/'
      },
      {
        nome: 'SATE',
        badge: 'Transporte Escolar',
        desc: 'Sistema de Agendamento do Transporte Escolar e abertura de chamados.',
        icon: '🚌',
        url: '/sate-sme/'
      },
      {
        nome: 'Roçadas',
        badge: 'Serviços',
        desc: 'Gestão e acompanhamento das roçadas e serviços de manutenção de áreas.',
        icon: '🌿',
        url: '/rocada/'
      },
      {
        nome: 'Repositório Pedagógico',
        badge: 'Pedagógico',
        desc: 'Repositório Pedagógico Municipal com materiais e recursos para a rede.',
        icon: '📚',
        url: '/repositorio/'
      },
      {
        nome: 'Portfólio MAG',
        badge: 'Revista',
        desc: 'Portfólio e revista digital com produções e registros da rede municipal.',
        icon: '📖',
        url: '/revista/'
      },
      {
        nome: 'Validação de Presença',
        badge: 'Eventos',
        desc: 'Inscrição, emissão de QR Code e validação de presença em eventos e formações.',
        icon: '✅',
        url: '/presenca/'
      },
    ];

    const grid = document.getElementById('grid');
    const arrow = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M13 6l6 6-6 6"/></svg>';

    sistemas.forEach((s) => {
      const a = document.createElement('a');
      a.className = 'card';
      a.href = s.url;
      a.setAttribute('aria-label', 'Acessar ' + s.nome);
      a.innerHTML =
        '<div class="card-icon">' + s.icon + '</div>' +
        '<div class="badge">' + s.badge + '</div>' +
        '<h3>' + s.nome + '</h3>' +
        '<p>' + s.desc + '</p>' +
        '<span class="go">Acessar ' + arrow + '</span>';
      grid.appendChild(a);
    });
  </script>
</body>
</html>
