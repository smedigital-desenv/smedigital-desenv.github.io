<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard - Presencas</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #0f1117;
      --surface: #1a1d27;
      --surface2:#212536;
      --border:  #2a2d3a;
      --accent:  #4f8ef7;
      --accent2: #7c3aed;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger:  #ef4444;
      --text:    #e8eaf0;
      --muted:   #6b7280;
      --radius:  14px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh; padding: 0;
    }
    body::before {
      content: ''; position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 10% 10%, rgba(79,142,247,.06) 0%, transparent 60%),
        radial-gradient(ellipse 40% 50% at 90% 90%, rgba(124,58,237,.06) 0%, transparent 60%);
      pointer-events: none;
    }

    /* ── TOPBAR ── */
    .topbar {
      position: sticky; top: 0; z-index: 10;
      background: rgba(15,17,23,.9);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex; align-items: center; justify-content: space-between; gap: 16px;
    }
    .topbar-left h1 { font-size: 18px; font-weight: 700; }
    .topbar-left p  { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .btn-refresh {
      display: flex; align-items: center; gap: 6px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text); border-radius: 10px;
      padding: 8px 14px; font-size: 13px; font-weight: 500;
      cursor: pointer; transition: background .2s;
      font-family: 'DM Sans', sans-serif;
    }
    .btn-refresh:hover { background: var(--surface2); }
    .btn-refresh svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .btn-refresh.loading svg { animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── CONTEÚDO ── */
    .content { max-width: 960px; margin: 0 auto; padding: 24px 20px; }

    /* ── CARDS DE RESUMO ── */
    .resumo {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px; margin-bottom: 24px;
    }
    .resumo-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px 20px;
      animation: fadeUp .3s ease both;
    }
    .resumo-card .label { font-size: 11px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 8px; }
    .resumo-card .valor { font-size: 32px; font-weight: 700; line-height: 1; }
    .resumo-card .sub   { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .cor-total    { color: var(--accent); }
    .cor-presente { color: var(--success); }
    .cor-ausente  { color: var(--danger); }
    .cor-taxa     { color: var(--warning); }

    /* ── TABELA DE PALESTRAS ── */
    .secao-titulo {
      font-size: 13px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: .8px;
      margin-bottom: 12px;
    }

    .palestras-grid { display: flex; flex-direction: column; gap: 10px; }

    .palestra-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px 20px;
      animation: fadeUp .3s ease both;
    }

    .palestra-header {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 12px;
      margin-bottom: 14px;
    }

    .palestra-nome { font-size: 15px; font-weight: 600; }
    .palestra-carga { font-size: 12px; color: var(--muted); margin-top: 3px; }

    .taxa-badge {
      flex-shrink: 0;
      font-size: 13px; font-weight: 700;
      padding: 4px 10px; border-radius: 8px;
    }
    .taxa-alta   { background: rgba(34,197,94,.15);  color: #86efac; }
    .taxa-media  { background: rgba(245,158,11,.15); color: #fcd34d; }
    .taxa-baixa  { background: rgba(239,68,68,.15);  color: #fca5a5; }

    /* barra de progresso */
    .barra-wrap { margin-bottom: 12px; }
    .barra-bg {
      background: var(--border); border-radius: 99px;
      height: 8px; overflow: hidden;
    }
    .barra-fill {
      height: 100%; border-radius: 99px;
      background: linear-gradient(90deg, var(--accent), var(--success));
      transition: width .6s cubic-bezier(.4,0,.2,1);
    }

    /* números */
    .palestra-nums {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .num-item { text-align: center; }
    .num-item .n { font-size: 22px; font-weight: 700; }
    .num-item .l { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .n-inscritos  { color: var(--text); }
    .n-presentes  { color: var(--success); }
    .n-ausentes   { color: var(--danger); }

    /* ── LOADING / ERRO ── */
    .estado {
      text-align: center; padding: 60px 20px;
      color: var(--muted); font-size: 15px;
    }
    .estado svg { width: 40px; height: 40px; stroke: var(--muted); fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; margin-bottom: 12px; display: block; margin-left: auto; margin-right: auto; }

    /* ── ATUALIZADO EM ── */
    .atualizado { font-size: 11px; color: var(--muted); text-align: right; margin-top: 16px; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

    /* ── RESPONSIVO ── */
    @media (max-width: 480px) {
      .topbar { padding: 12px 16px; }
      .content { padding: 16px; }
      .resumo-card .valor { font-size: 26px; }
      .palestra-nums { gap: 4px; }
      .num-item .n { font-size: 18px; }
    }
  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-left">
      <h1>Dashboard de Presencas</h1>
      <p id="subtitulo">Carregando...</p>
    </div>
    <button class="btn-refresh" id="btnRefresh" onclick="carregar()">
      <svg viewBox="0 0 24 24"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
      Atualizar
    </button>
  </div>

  <div class="content">

    <!-- cards de resumo geral -->
    <div class="resumo" id="resumo">
      <div class="resumo-card"><div class="label">Total inscritos</div><div class="valor cor-total" id="rTotal">-</div></div>
      <div class="resumo-card"><div class="label">Presentes</div><div class="valor cor-presente" id="rPresentes">-</div></div>
      <div class="resumo-card"><div class="label">Ausentes</div><div class="valor cor-ausente" id="rAusentes">-</div></div>
      <div class="resumo-card"><div class="label">Taxa geral</div><div class="valor cor-taxa" id="rTaxa">-</div><div class="sub">de presenca</div></div>
    </div>

    <div class="secao-titulo">Por palestra</div>

    <!-- palestras -->
    <div id="conteudo">
      <div class="estado">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
        Carregando dados...
      </div>
    </div>

    <div class="atualizado" id="atualizado"></div>

  </div>

<script>
  var SUPA_URL = "https://kormvmwdkyssxhdkgthd.supabase.co/rest/v1";
  var SUPA_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imtvcm12bXdka3lzc3hoZGtndGhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNDU3MDAsImV4cCI6MjA5NTcyMTcwMH0._x3hrly1GYE4CNj8xZllQHoFqbgt5Bwrj2T9clMx0ls";

  function h() { return { "apikey": SUPA_KEY, "Authorization": "Bearer " + SUPA_KEY }; }

  function carregar() {
    var btn = document.getElementById("btnRefresh");
    btn.classList.add("loading");
    document.getElementById("conteudo").innerHTML =
      '<div class="estado"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>Carregando...</div>';

    // Busca palestras, participantes e presenças em paralelo
    Promise.all([
      fetch(SUPA_URL + "/palestras?select=id,nome,carga_horaria&order=nome", { headers: h() }).then(function(r){ return r.json(); }),
      fetch(SUPA_URL + "/participantes?select=token,palestra_id", { headers: h() }).then(function(r){ return r.json(); }),
      fetch(SUPA_URL + "/presencas?select=token,palestra_id", { headers: h() }).then(function(r){ return r.json(); })
    ])
    .then(function(results) {
      btn.classList.remove("loading");
      renderizar(results[0], results[1], results[2]);
    })
    .catch(function(err) {
      btn.classList.remove("loading");
      document.getElementById("conteudo").innerHTML =
        '<div class="estado"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>Erro ao carregar dados.</div>';
    });
  }

  function renderizar(palestras, participantes, presencas) {

    // Mapa token -> palestra_id de quem tem presença
    var tokensPresentes = {};
    presencas.forEach(function(p) { tokensPresentes[p.token] = true; });

    // Agrupa por palestra
    var mapInscritos = {};
    var mapPresentes = {};
    palestras.forEach(function(pal) {
      mapInscritos[pal.id] = 0;
      mapPresentes[pal.id] = 0;
    });

    participantes.forEach(function(p) {
      if (mapInscritos[p.palestra_id] !== undefined) {
        mapInscritos[p.palestra_id]++;
        if (tokensPresentes[p.token]) mapPresentes[p.palestra_id]++;
      }
    });

    // Totais gerais
    var totalInscritos = participantes.length;
    var totalPresentes = presencas.length;
    var totalAusentes  = totalInscritos - totalPresentes;
    var taxaGeral = totalInscritos > 0 ? Math.round(totalPresentes / totalInscritos * 100) : 0;

    document.getElementById("rTotal").textContent    = totalInscritos;
    document.getElementById("rPresentes").textContent = totalPresentes;
    document.getElementById("rAusentes").textContent  = totalAusentes;
    document.getElementById("rTaxa").textContent      = taxaGeral + "%";
    document.getElementById("subtitulo").textContent  =
      palestras.length + " palestra(s) · " + totalInscritos + " inscrito(s)";

    // Renderiza cards de palestras ordenados por taxa desc
    var dados = palestras.map(function(pal) {
      var inscritos = mapInscritos[pal.id] || 0;
      var presentes = mapPresentes[pal.id] || 0;
      var ausentes  = inscritos - presentes;
      var taxa      = inscritos > 0 ? Math.round(presentes / inscritos * 100) : 0;
      return { pal: pal, inscritos: inscritos, presentes: presentes, ausentes: ausentes, taxa: taxa };
    }).sort(function(a, b) { return b.taxa - a.taxa; });

    var html = '<div class="palestras-grid">';

    dados.forEach(function(d, idx) {
      var taxaClass = d.taxa >= 75 ? "taxa-alta" : d.taxa >= 40 ? "taxa-media" : "taxa-baixa";
      var delay = idx * 0.05;
      html +=
        '<div class="palestra-card" style="animation-delay:' + delay + 's">' +
          '<div class="palestra-header">' +
            '<div>' +
              '<div class="palestra-nome">' + d.pal.nome + '</div>' +
              (d.pal.carga_horaria ? '<div class="palestra-carga">' + d.pal.carga_horaria + '</div>' : '') +
            '</div>' +
            '<span class="taxa-badge ' + taxaClass + '">' + d.taxa + '%</span>' +
          '</div>' +
          '<div class="barra-wrap">' +
            '<div class="barra-bg">' +
              '<div class="barra-fill" style="width:' + d.taxa + '%"></div>' +
            '</div>' +
          '</div>' +
          '<div class="palestra-nums">' +
            '<div class="num-item"><div class="n n-inscritos">' + d.inscritos + '</div><div class="l">Inscritos</div></div>' +
            '<div class="num-item"><div class="n n-presentes">' + d.presentes + '</div><div class="l">Presentes</div></div>' +
            '<div class="num-item"><div class="n n-ausentes">'  + d.ausentes  + '</div><div class="l">Ausentes</div></div>' +
          '</div>' +
        '</div>';
    });

    html += '</div>';
    document.getElementById("conteudo").innerHTML = html;

    var agora = new Date().toLocaleString("pt-BR");
    document.getElementById("atualizado").textContent = "Atualizado em " + agora;
  }

  // Carrega ao abrir
  carregar();

  // Auto-atualiza a cada 60 segundos
  setInterval(carregar, 60000);
</script>
</body>
</html>
