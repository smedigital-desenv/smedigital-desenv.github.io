<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>

    :root {
      --bg: #eef4ff;
      --bg-2: #f8fafc;
      --surface: rgba(255,255,255,.92);
      --surface-solid: #ffffff;
      --primary: #1d4ed8;
      --primary-dark: #1e3a8a;
      --primary-soft: #dbeafe;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --success: #0f9f6e;
      --danger: #dc2626;
      --purple: #7c3aed;
      --warning: #f59e0b;
      --shadow: 0 24px 60px rgba(15,23,42,.10);
      --shadow-soft: 0 12px 30px rgba(15,23,42,.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      padding: 26px;
      font-family: 'Segoe UI', Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 14%, rgba(29,78,216,.15), transparent 28%),
        radial-gradient(circle at 88% 8%, rgba(15,159,110,.12), transparent 30%),
        linear-gradient(135deg, var(--bg-2) 0%, var(--bg) 52%, var(--bg-2) 100%);
    }
    .container { max-width: 1280px; margin: 0 auto; }
    .header {
      background: var(--surface);
      padding: 26px;
      border-radius: 28px;
      margin-bottom: 18px;
      border: 1px solid rgba(255,255,255,.72);
      text-align: left;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
      position: relative;
      overflow: hidden;
    }
    .header::before { content:''; position:absolute; inset:0 0 auto 0; height:6px; background: linear-gradient(90deg, var(--primary), var(--success), var(--purple)); }
    .header h2 { margin: 0; font-size: 26px; letter-spacing: -0.035em; color: var(--text); display:flex; align-items:center; gap:12px; }
    .header h2::before { content:'▦'; width:42px; height:42px; border-radius:15px; display:inline-grid; place-items:center; background:linear-gradient(135deg,var(--primary),var(--primary-dark)); color:white; box-shadow:0 14px 28px rgba(29,78,216,.25); font-size:18px; }
    .filters {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
      margin-bottom: 22px;
      background: rgba(255,255,255,.70);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 18px;
      box-shadow: var(--shadow-soft);
      backdrop-filter: blur(14px);
    }
    .filters div { min-width: 0; }
    label { font-size: 11px; font-weight: 900; color: var(--muted); text-transform: uppercase; display: block; margin-bottom: 7px; letter-spacing:.06em; }
    select, input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 14px; box-sizing: border-box; outline: none; background: var(--surface-solid); color: var(--text); font-family: inherit; transition: .18s; }
    select:focus, input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px var(--primary-soft); }
    .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .card {
      background: var(--surface);
      padding: 20px;
      border-radius: 24px;
      box-shadow: var(--shadow-soft);
      border: 1px solid var(--border);
      border-left: 0;
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      min-height: 150px;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(12px);
    }
    .card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:6px; background: var(--muted); }
    .card:hover { transform: translateY(-3px); box-shadow: var(--shadow); border-color: rgba(29,78,216,.26); }
    .card h3 { margin: 0 0 12px 0; font-size: 15px; color: var(--text); line-height: 1.35; letter-spacing:-.01em; }
    .card p { margin: 0; font-size: 12px; color: var(--muted); font-weight: 900; }
    .card-fin { background: linear-gradient(180deg, rgba(240,253,244,.96), rgba(255,255,255,.92)); }
    .card-fin::before { background: var(--success); }
    .card-dev { background: linear-gradient(180deg, rgba(254,242,242,.96), rgba(255,255,255,.92)); }
    .card-dev::before { background: var(--danger); }
    .badge { align-self: flex-start; margin-top: 16px; padding: 6px 10px; border-radius: 999px; font-size: 10px; font-weight: 900; text-transform: uppercase; border: 1px solid; background-color: white; letter-spacing:.04em; }
    .FINALIZADO { color: var(--success); border-color: rgba(15,159,110,.35); background: rgba(15,159,110,.10); }
    .DEVOLVIDO, .DEVOLVIDO_COM_PENDENCIAS { color: var(--danger); border-color: rgba(220,38,38,.32); background: rgba(220,38,38,.10); }
    .EM_CONFERENCIA { color: var(--warning); border-color: rgba(245,158,11,.34); background: rgba(245,158,11,.10); }
    .RECEBIDO { color: var(--purple); border-color: rgba(124,58,237,.30); background: rgba(124,58,237,.10); }
    @media (max-width: 1120px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 820px) { body { padding: 16px; } .grid { grid-template-columns: repeat(2, 1fr); } .header h2 { font-size: 22px; } }
    @media (max-width: 540px) { .grid { grid-template-columns: 1fr; } .filters { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="container">
  <div class="header"><h2>Consulta Pública · Prestação de Contas</h2></div>
  <div class="filters">
    <div><label>Tipo de Unidade</label><select id="f-tipo" onchange="aplicar()"><option value="ALL">Todas</option><option value="CEI">CEI</option><option value="EMEI">EMEI</option><option value="EMEF">EMEF</option></select></div>
    <div><label>Mês de Referência</label><select id="f-mes" onchange="aplicar()"><option value="ALL">Todos os Meses</option></select></div>
    <div><label>Buscar Escola</label><input type="text" id="f-txt" placeholder="Digite o nome..." onkeyup="aplicar()"></div>
  </div>
  <div class="grid" id="grid"></div>
</div>
<script>
  var base = [];
  window.onload = function() { google.script.run.withSuccessHandler(init).getDadosAcompanhamentoAdmin(); };
  function init(res) { 
    base = res.acompanhamento; 
    var selMes = document.getElementById('f-mes');
    var meses = [...new Set(base.map(i => i.mesAno))].filter(Boolean).sort();
    meses.forEach(m => selMes.add(new Option(m, m)));
    
    var dataAtual = new Date();
    var mesAtualStr = String(dataAtual.getMonth() + 1).padStart(2, '0') + '/' + dataAtual.getFullYear();
    document.getElementById('f-tipo').value = "ALL";
    if (meses.includes(mesAtualStr)) selMes.value = mesAtualStr; 
    else if (meses.length > 0) selMes.value = meses[meses.length - 1];
    
    aplicar(); 
  }
  function aplicar() {
    var fT = document.getElementById('f-tipo').value, fM = document.getElementById('f-mes').value, fX = document.getElementById('f-txt').value.toLowerCase();
    var g = document.getElementById('grid'); g.innerHTML = '';
    var filtrados = base.filter(i => (fT==='ALL' || i.escola.toUpperCase().startsWith(fT)) && (fM==='ALL' || i.mesAno===fM) && (fX==='' || i.escola.toLowerCase().includes(fX)));
    if(filtrados.length === 0) { g.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: #6b778c; padding: 40px;">Nenhuma unidade encontrada.</div>'; return; }
    
    filtrados.forEach(i => {
      var st = (i.status || "PENDENTE_RECEBIMENTO").replace("DEVOLVIDO_COM_PENDENCIAS", "DEVOLVIDO");
      var d = document.createElement('div'); 
      d.className = 'card';
      
      // APLICA AS CLASSES QUE PINTAM O FUNDO DO CARD INTEIRO
      if(st==="FINALIZADO") d.classList.add("card-fin"); 
      else if(st==="DEVOLVIDO") d.classList.add("card-dev"); 

      d.innerHTML = `<h3>${i.escola}</h3><p>Mês: ${i.mesAno}</p><span class="badge ${i.status}">${st.replace(/_/g, ' ')}</span>`;
      g.appendChild(d);
    });
  }
</script>
</body>
</html>
