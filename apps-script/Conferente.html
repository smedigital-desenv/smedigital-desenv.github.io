<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>

    :root {
      --bg: #eef4ff;
      --bg-2: #f8fafc;
      --card: rgba(255,255,255,.92);
      --card-solid: #ffffff;
      --primary: #1d4ed8;
      --primary-dark: #1e3a8a;
      --primary-soft: #dbeafe;
      --text: #0f172a;
      --text-sec: #64748b;
      --border: #e2e8f0;
      --bg-item: #ffffff;
      --c-dev: #dc2626;
      --c-fin: #0f9f6e;
      --c-rec: #7c3aed;
      --c-warn: #f59e0b;
      --shadow: 0 24px 60px rgba(15, 23, 42, 0.10);
      --shadow-soft: 0 12px 30px rgba(15, 23, 42, 0.08);
    }

    body.dark-mode {
      --bg: #07111f;
      --bg-2: #0f172a;
      --card: rgba(15, 23, 42, .92);
      --card-solid: #111827;
      --primary: #60a5fa;
      --primary-dark: #2563eb;
      --primary-soft: rgba(96, 165, 250, .16);
      --text: #e5eefb;
      --text-sec: #94a3b8;
      --border: rgba(148, 163, 184, .22);
      --bg-item: #0b1220;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
      background:
        radial-gradient(circle at 10% 10%, rgba(29, 78, 216, .16), transparent 28%),
        radial-gradient(circle at 82% 12%, rgba(15, 159, 110, .12), transparent 30%),
        linear-gradient(135deg, var(--bg-2), var(--bg));
      color: var(--text);
      display: flex;
      height: 100vh;
      flex-direction: row;
      overflow: hidden;
      transition: background .25s, color .25s;
    }

    .sidebar {
      width: 360px;
      background: var(--card);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 22px;
      flex-shrink: 0;
      transition: background .25s;
      box-shadow: 12px 0 40px rgba(15, 23, 42, .08);
      backdrop-filter: blur(16px);
    }

    .sidebar h3 {
      margin: 0 0 16px;
      color: var(--text);
      font-size: 19px;
      letter-spacing: -0.02em;
      border-bottom: 1px solid var(--border);
      padding-bottom: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
    }
    .sidebar h3::before {
      content: '▦';
      width: 38px;
      height: 38px;
      border-radius: 14px;
      display: inline-grid;
      place-items: center;
      color: white;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      box-shadow: 0 12px 24px rgba(29, 78, 216, .24);
      font-size: 16px;
      margin-right: 2px;
    }

    .btn-tema {
      background: rgba(255,255,255,.76);
      border: 1px solid var(--border);
      font-size: 14px;
      cursor: pointer;
      color: var(--text-sec);
      padding: 8px 10px;
      border-radius: 12px;
      transition: .18s;
    }
    .btn-tema:hover { transform: translateY(-1px); box-shadow: var(--shadow-soft); }
    body.dark-mode .btn-tema { background: rgba(15,23,42,.7); }

    .filter-box { margin-bottom: 14px; }
    .filter-box label, .label-header label {
      font-size: 11px;
      font-weight: 900;
      color: var(--text-sec);
      text-transform: uppercase;
      display: block;
      margin-bottom: 7px;
      letter-spacing: .06em;
    }
    .filter-box select, .filter-box input, select, textarea, input {
      width: 100%;
      padding: 11px 12px;
      border: 1px solid var(--border);
      border-radius: 14px;
      font-family: inherit;
      font-size: 14px;
      box-sizing: border-box;
      outline: none;
      background: var(--bg-item);
      color: var(--text);
      transition: border-color .18s, box-shadow .18s, background .18s;
    }
    select:focus, textarea:focus, input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px var(--primary-soft);
    }
    textarea { min-height: 145px; resize: vertical; }
    option { background-color: var(--bg-item) !important; color: var(--text) !important; }

    .escola-item {
      padding: 14px;
      border: 1px solid var(--border);
      border-radius: 18px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
      background: var(--card-solid);
      color: var(--text);
      box-shadow: 0 8px 20px rgba(15,23,42,.04);
      position: relative;
      overflow: hidden;
    }
    .escola-item::before { content:''; position:absolute; left:0; top:0; bottom:0; width:5px; background: var(--text-sec); }
    .escola-item:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: var(--shadow-soft); }
    .escola-item.active { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; border-color: transparent; }
    .escola-item.active::before { background: rgba(255,255,255,.65); }

    .escola-devolvida::before { background: var(--c-dev); }
    .escola-finalizada::before { background: var(--c-fin); }
    .escola-recebida::before { background: var(--c-rec); }
    .escola-finalizada .escola-nome { color: var(--c-fin); }
    .escola-devolvida .escola-nome { color: var(--c-dev); }
    .escola-recebida .escola-nome { color: var(--c-rec); }
    .escola-finalizada.active .escola-nome, .escola-devolvida.active .escola-nome, .escola-recebida.active .escola-nome { color: white; }
    .escola-nome { font-weight: 900; font-size: 13px; margin-bottom: 6px; line-height: 1.35; }
    .escola-mes { font-size: 11px; opacity: .8; font-weight: 800; }

    .main { flex: 1; padding: 28px; overflow-y: auto; display: flex; justify-content: center; position: relative; }
    .form {
      background: var(--card);
      padding: 26px;
      border-radius: 28px;
      box-shadow: var(--shadow);
      width: 100%;
      max-width: 680px;
      display: none;
      border: 1px solid var(--border);
      border-top: 0;
      height: fit-content;
      transition: background .25s;
      backdrop-filter: blur(16px);
      position: relative;
      overflow: hidden;
    }
    .form::before { content:''; position:absolute; top:0; left:0; right:0; height:6px; background: linear-gradient(90deg, var(--primary), var(--c-fin), var(--c-rec)); }

    #lbl-escola { margin: 8px 0 12px 0 !important; font-size: 22px !important; color: var(--text) !important; letter-spacing: -0.03em; }

    .label-header { display: flex; justify-content: space-between; align-items: baseline; margin: 16px 0 7px 0; gap: 12px; }
    .link-historico { font-size: 11px; color: var(--primary); font-weight: 900; text-decoration: none; cursor: pointer; background: var(--primary-soft); padding: 6px 10px; border-radius: 999px; }

    .input-error { border-color: var(--c-dev) !important; background-color: rgba(220, 38, 38, .08) !important; box-shadow: 0 0 0 4px rgba(220, 38, 38, .10) !important; }
    .alerta-erro { color: var(--c-dev); font-size: 11px; font-weight: 900; margin-top: 6px; display: none; }

    .btn-salvar, .btn-receber, .btn-limpar, #btn-cobrar, #btn-voltar-admin {
      align-items: center;
      justify-content: center;
      gap: 8px;
      color: white;
      border: none;
      border-radius: 16px !important;
      font-weight: 900;
      cursor: pointer;
      transition: transform .18s, box-shadow .18s, opacity .18s;
      text-decoration: none;
      box-shadow: 0 12px 26px rgba(15, 23, 42, .12);
      box-sizing: border-box;
    }
    .btn-salvar { background: linear-gradient(135deg, var(--primary), var(--primary-dark)); padding: 15px; width: 100%; margin-top: 20px; }
    .btn-receber { background: linear-gradient(135deg, var(--c-fin), #047857); padding: 18px; width: 100%; }
    .btn-limpar { background: linear-gradient(135deg, #64748b, #475569); padding: 11px; width: 100%; margin-bottom: 15px; }
    #btn-cobrar { background: linear-gradient(135deg, var(--c-warn), #d97706) !important; }
    #btn-voltar-admin { background: linear-gradient(135deg, #64748b, #475569) !important; }
    .btn-salvar:hover, .btn-receber:hover, .btn-limpar:hover, #btn-cobrar:hover, #btn-voltar-admin:hover { transform: translateY(-1px); opacity: .94; }

    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,.64); z-index: 2000; display: none; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; backdrop-filter: blur(8px); }
    .modal-content { background: var(--card-solid); width: 100%; max-width: 560px; border-radius: 24px; box-shadow: var(--shadow); display: flex; flex-direction: column; max-height: 82vh; border: 1px solid var(--border); overflow: hidden; }
    .modal-header { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); color: white; }
    .modal-body { padding: 20px; overflow-y: auto; white-space: pre-wrap; font-size: 13px; line-height: 1.6; color: var(--text); }
    .btn-close { background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.22); width: 34px; height: 34px; border-radius: 12px; cursor: pointer; color: inherit; line-height: 1; font-size: 22px; }

    .hide-for-validador { display: none !important; }
    .badges-container { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; align-items: center; }
    .badge-status, .badge-dev, .badge-prazo, .badge-cobranca { padding: 6px 10px; border-radius: 999px; font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: .04em; border: 1px solid transparent; }
    .badge-status { background: var(--primary-soft); color: var(--primary); }
    .badge-dev { background: rgba(220,38,38,.10); color: var(--c-dev); border-color: rgba(220,38,38,.22); display: none; }
    .badge-prazo { background: rgba(245,158,11,.12); color: #b45309; border-color: rgba(245,158,11,.24); display: none; }
    .badge-cobranca { background: rgba(245,158,11,.12); color: #b45309; border-color: rgba(245,158,11,.24); display: none; }
    body.dark-mode .badge-prazo { color: #fbbf24; }
    .RECEBIDO { color: var(--c-rec) !important; border-color: rgba(124,58,237,.32) !important; background-color: rgba(124,58,237,.10) !important; }

    .spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid rgba(255,255,255,.35); border-radius: 50%; border-top-color: #fff; animation: spin 1s ease-in-out infinite; margin-right: 8px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 820px) {
      body { flex-direction: column; height: auto; min-height: 100vh; overflow: auto; }
      .sidebar { width: 100%; max-height: none; border-right: none; border-bottom: 1px solid var(--border); }
      .main { padding: 16px; }
      .form { padding: 22px; border-radius: 24px; }
    }
  </style>
</head>
<body>

  <div id="modal-historico" class="modal-overlay" onclick="fecharHistorico()">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="modal-header"><h3 style="margin: 0; font-size: 14px; color: var(--primary);">Histórico de Devoluções</h3><button class="btn-close" onclick="fecharHistorico()">×</button></div>
      <div class="modal-body" id="texto-historico">Nenhum histórico registrado.</div>

  <div class="sidebar">
    <h3 id="sidebar-title">Minhas Análises <button class="btn-tema" onclick="alternarTema()" title="Mudar Tema">🌙</button></h3>
    
    <a id="btn-voltar-admin" href="<?= ScriptApp.getService().getUrl() ?>?modo=adm" target="_top" style="display:none; background:#6b778c; color:white; border:none; padding:10px; width:100%; border-radius:6px; font-weight:bold; cursor:pointer; margin-bottom:15px; transition:0.2s; text-decoration:none; text-align:center; box-sizing:border-box;">⚙️ Voltar ao Painel Gestor</a>

    <button id="btn-limpar-finalizadas" class="btn-limpar" onclick="limparFinalizadas()">🧹 Ocultar Finalizadas</button>

    <div class="filter-box" id="caixa-filtro">

      <select id="filtro-mes" onchange="atualizarLista()">

    <div class="filter-box" id="caixa-filtro-escola">

  <div class="main">
    <div class="form" id="form">
      <h2 id="lbl-escola" style="margin:0 0 10px 0; font-size:18px; color: var(--primary);">Escola</h2>
      
      <div class="badges-container">
        <span id="lbl-status" class="badge-status">Status</span>
        <span id="lbl-devolvido" class="badge-dev">Devolvido em:</span>
        <span id="lbl-prazo" class="badge-prazo">Prazo até:</span>

          <label style="font-size: 12px; font-weight: bold; color: var(--c-fin); text-transform: uppercase; display:block; margin-bottom: 5px;">Saldo Atual da Conta (Obrigatório):</label>
          <input type="text" id="input-saldo" placeholder="R$ 0,00" oninput="mascaraMoeda(this)" style="font-weight: bold; color: var(--c-fin); font-size: 16px; border: 1px solid var(--c-fin);">

          <label style="font-size: 11px; font-weight: bold; color: var(--text-sec); display: block; margin-bottom: 5px;">📎 Anexar Imagem ou PDF como evidência (Opcional):</label>
          <input type="file" id="input-anexo" accept="image/*, application/pdf" style="font-size: 12px; border: none; padding: 0; background: transparent;">
        </div>
        
        
        
        <button class="btn-salvar" onclick="salvarTudo()">💾 Salvar e Processar</button>

  <script>
    var dadosGerais = [], escolaAtiva = null;
    var emailConferente = "<?= emailLogado ?>";
    var perfilUsuario = "<?= perfilLogado ?>"; 

    function checarTema() { if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode'); }
    function alternarTema() { document.body.classList.toggle('dark-mode'); localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light'); }

   window.onload = function() { 
      checarTema();
      if (perfilUsuario === 'ADMIN' || perfilUsuario === 'ADMIN E CONFERENTE') {
        document.getElementById('btn-voltar-admin').style.display = 'block';
      }
      
      if (perfilUsuario === 'VALIDADOR') {
        document.getElementById('sidebar-title').innerHTML = 'Recepção de Malotes <button class="btn-tema" onclick="alternarTema()" title="Mudar Tema">🌙</button>';
        document.getElementById('caixa-filtro').style.display = 'none'; 
        document.getElementById('btn-limpar-finalizadas').style.display = 'none';
        document.getElementById('area-conf').classList.add('hide-for-validador');
      }

      var listaEl = document.getElementById('lista');
      google.script.run
        .withFailureHandler(function(err) {
          // Antes, sem este handler, um erro no servidor deixava a tela travada em "Carregando..." (o "parou de pegar").
          if (listaEl) listaEl.innerHTML = '<div style="padding:18px; border:1px dashed var(--c-dev); border-radius:10px; color:var(--c-dev); font-size:12px; text-align:center; background:var(--bg-item);">⚠️ Não foi possível carregar suas análises.<br><br>' + (err && err.message ? err.message : err) + '<br><br>Recarregue a página. Se continuar, avise a gestão com esta mensagem.</div>';
        })
        .withSuccessHandler(function(res) {
          // Protege contra retorno inesperado (ex.: string de erro) para nunca travar a tela.
          dadosGerais = Array.isArray(res) ? res : [];
          var selMes = document.getElementById('filtro-mes');
          if(selMes) {
            selMes.innerHTML = '<option value="ALL">Todos os Meses</option>';
            var mesesUnicos = [...new Set(dadosGerais.map(i => i.mesAno))].filter(Boolean).sort(ordenarMesAno);
            mesesUnicos.forEach(m => selMes.add(new Option(m, m)));
          }
          atualizarLista();
        })
        .getDadosConferente(emailConferente);
    };

    // Ordena "MM/YYYY" cronologicamente (o sort padrão colocava 12/2025 depois de 01/2026).
    function ordenarMesAno(a, b) {
      var pa = String(a || '').split('/'), pb = String(b || '').split('/');
      var ka = (pa[1] || '') + '-' + (pa[0] || '').padStart(2, '0');
      var kb = (pb[1] || '') + '-' + (pb[0] || '').padStart(2, '0');
      return ka.localeCompare(kb);
    }

    // =======================================================
    // FUNÇÃO ATUALIZAR LISTA (FILTROS CORRIGIDOS)
    // =======================================================
    function atualizarLista() {
      var lista = document.getElementById('lista');
      if (!lista) return;
      lista.innerHTML = '';

      var elMes = document.getElementById('filtro-mes');
      var filtroMes = elMes ? elMes.value : "ALL";
      
      var elStatus = document.getElementById('filtro-status');
      var filtroStatus = elStatus ? elStatus.value : "ALL";
      
      var elBusca = document.getElementById('filtro-escola');
      var busca = elBusca ? elBusca.value.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, "") : "";

      var qtPend = 0, qtRec = 0, qtDev = 0, qtFin = 0, qtRenderizados = 0;

      dadosGerais.forEach(function(i, index) {
        // O backend já entrega apenas os registros permitidos para o perfil logado.
        var matchPerfil = true;
        if (!matchPerfil) return;

        var matchMes = (filtroMes === "ALL" || filtroMes === "") ? true : (i.mesAno === filtroMes);
        if (!matchMes) return;

        if (busca !== "") {
          var nomeEscola = (i.escola || "").toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, "");
          if (!nomeEscola.includes(busca)) return;
        }

        var stOriginal = (i.status || "PENDENTE_RECEBIMENTO").toString().toUpperCase().replace(/\s+/g, '_');
        
        if (stOriginal.includes("PENDENTE")) qtPend++;
        else if (stOriginal === "RECEBIDO") qtRec++;
        else if (stOriginal.includes("DEVOLVIDO")) qtDev++;
        else if (stOriginal === "FINALIZADO") qtFin++;

        var matchStatus = true;
        if (filtroStatus === 'PENDENTE_RECEBIMENTO') matchStatus = stOriginal.includes("PENDENTE");
        else if (filtroStatus === 'RECEBIDO') matchStatus = (stOriginal === "RECEBIDO");
        else if (filtroStatus === 'DEVOLVIDO') matchStatus = stOriginal.includes("DEVOLVIDO");
        else if (filtroStatus === 'FINALIZADO') matchStatus = (stOriginal === "FINALIZADO");

        if (!matchStatus) return;

        qtRenderizados++;

        var item = document.createElement('div'); 
        item.className = 'escola-item';
        if (stOriginal === "FINALIZADO") item.classList.add('escola-finalizada');
        else if (stOriginal.includes("DEVOLVIDO")) item.classList.add('escola-devolvida');
        else if (stOriginal === "RECEBIDO") item.classList.add('escola-recebida');
        
        if (escolaAtiva && escolaAtiva.linha === i.linha) item.classList.add('active');

        item.onclick = function() { abrirFormulario(index, this); };

        var stView = stOriginal.replace(/_/g, ' ');
        var bgBadge = "var(--text-sec)";
        if(stOriginal === "FINALIZADO") bgBadge = "var(--c-fin)";
        else if(stOriginal.includes("DEVOLVIDO")) bgBadge = "var(--c-dev)";
        else if(stOriginal === "RECEBIDO") bgBadge = "var(--c-rec)";

        item.innerHTML = `
          <div class="escola-nome">${i.escola}</div>
          <div style="font-size:11px; margin-top:4px; display:flex; justify-content:space-between; gap:10px;">
            <span style="color:${bgBadge}; font-weight:bold;">${stView}</span>
            <span style="color:var(--text-sec)">${i.mesAno}</span>
          </div>
          ${i.cobrancaEnviadaEm ? `<div style="font-size:10px; margin-top:6px; color:#b45309; font-weight:800;">⚠️ Cobrado em ${i.cobrancaEnviadaEmCompleta || i.cobrancaEnviadaEm}</div>` : ``}
        `;
        lista.appendChild(item);
      });

      if (qtRenderizados === 0) {
        lista.innerHTML = '<div style="padding:18px; border:1px dashed var(--border); border-radius:10px; color:var(--text-sec); font-size:12px; text-align:center; background:var(--bg-item);">Nenhuma unidade encontrada para os filtros selecionados.</div>';
      }

      var cPend = document.getElementById('count-pendentes'); if(cPend) cPend.innerText = qtPend;
      var cRec = document.getElementById('count-recebidos'); if(cRec) cRec.innerText = qtRec;
      var cDev = document.getElementById('count-devolvidos'); if(cDev) cDev.innerText = qtDev;
      var cFin = document.getElementById('count-finalizados'); if(cFin) cFin.innerText = qtFin;
    }

    function limparFinalizadas() {
      dadosGerais = dadosGerais.filter(i => {
        var st = (i.status || "").toUpperCase().replace(/\s+/g, '_');
        return st !== "FINALIZADO";
      });
      escolaAtiva = null;
      document.getElementById('form').style.display = 'none';
      atualizarLista();
    }

    function abrirFormulario(idx, elemento) {
      document.querySelectorAll('.escola-item').forEach(el => el.classList.remove('active')); 
      if (elemento) elemento.classList.add('active');
      escolaAtiva = dadosGerais[idx];
      document.getElementById('lbl-escola').innerText = escolaAtiva.escola;
      
      var stView = (escolaAtiva.status || "PENDENTE RECEBIMENTO").replace(/_/g, ' ');
      document.getElementById('lbl-status').innerText = stView;
      
      var lblDevolvido = document.getElementById('lbl-devolvido');
      if (escolaAtiva.devolvidoEm) {
        lblDevolvido.innerText = "Devolvido em: " + escolaAtiva.devolvidoEm;
        lblDevolvido.style.display = "inline-block";
      } else {
        lblDevolvido.style.display = "none";
      }

      var lblPrazo = document.getElementById('lbl-prazo');
      if (escolaAtiva.prazo) {
        lblPrazo.innerText = "Prazo até: " + escolaAtiva.prazo;
        lblPrazo.style.display = "inline-block";
      } else {
        lblPrazo.style.display = "none";
      }

      var lblCobranca = document.getElementById('lbl-cobranca');
      var dataCobranca = escolaAtiva.cobrancaEnviadaEmCompleta || escolaAtiva.cobrancaEnviadaEm || "";
      if (dataCobranca) {
        lblCobranca.innerText = "Cobrança enviada em: " + dataCobranca;
        lblCobranca.style.display = "inline-block";
      } else {
        lblCobranca.style.display = "none";
      }
      
      document.getElementById('input-pend').value = escolaAtiva.pendencias;
      document.getElementById('acao-select').value = ""; 
      limparErrosVisuais(); 
      
      document.getElementById('form').style.display = 'block';
      
      var statusAtual = (escolaAtiva.status || "").toString().toUpperCase().replace(/\s+/g, '_');
      var isPendente = (statusAtual === "" || statusAtual === "PENDENTE_RECEBIMENTO");
      var jaCobrado = !!(escolaAtiva.cobrancaEnviadaEm || escolaAtiva.cobrancaEnviadaEmCompleta);
      var btnCobrarTela = document.getElementById('btn-cobrar');
      if (btnCobrarTela) {
        btnCobrarTela.innerText = jaCobrado ? '⚠️ Enviar Nova Cobrança' : '⚠️ Enviar E-mail de Cobrança';
        btnCobrarTela.title = jaCobrado ? 'Já existe uma cobrança registrada. Clique apenas se tiver certeza que deseja reenviar.' : 'Enviar e-mail de cobrança para prestação pendente.';
      }
      
      if (perfilUsuario === 'VALIDADOR') {
        document.getElementById('btn-receber').style.display = 'block';
        document.getElementById('btn-cobrar').style.display = 'none'; // Validador não cobra
      } else {
        document.getElementById('btn-receber').style.display = isPendente ? 'block' : 'none';
        document.getElementById('btn-cobrar').style.display = isPendente ? 'block' : 'none'; // Mantém o botão visível em pendentes, mesmo se já houve cobrança
        document.getElementById('area-conf').style.display = isPendente ? 'none' : 'block';
      }
      
      if(window.innerWidth <= 768) document.querySelector('.main').scrollTop = 0;
    }

    function limparErrosVisuais() {
      var acao = document.getElementById('acao-select').value;
      var txtPend = document.getElementById('input-pend');
      var blocoSaldo = document.getElementById('bloco-saldo');
      
      blocoSaldo.style.display = (acao === "FINALIZAR_OK") ? "block" : "none";
      
      document.getElementById('acao-select').classList.remove('input-error');
      document.getElementById('alerta-acao').style.display = 'none';
      txtPend.classList.remove('input-error');
      
      if (acao === "DEVOLVER_COM_PENDENCIAS") {
        document.getElementById('lbl-pend-text').innerHTML = 'Pendências Atuais: <span style="color:var(--c-dev);">(Obrigatório)</span>';
      } else {
        document.getElementById('lbl-pend-text').innerHTML = 'Pendências Atuais:';
      }
    }

    function abrirHistorico() {
      if(!escolaAtiva) return;
      document.getElementById('texto-historico').innerText = escolaAtiva.historico ? escolaAtiva.historico : "Nenhum histórico de devolução registrado para esta unidade.";
      document.getElementById('modal-historico').style.display = 'flex';
    }
    function fecharHistorico() { document.getElementById('modal-historico').style.display = 'none'; }

    // --- FUNÇÃO DE COBRANÇA (Com data registrada e confirmação para reenvio) ---
    function cobrarEnvio() {
      var dataCobrancaAnterior = escolaAtiva.cobrancaEnviadaEmCompleta || escolaAtiva.cobrancaEnviadaEm || "";
      var jaCobrado = !!dataCobrancaAnterior;

      var mensagemConfirmacao = jaCobrado
        ? "Atenção: esta escola já recebeu cobrança em " + dataCobrancaAnterior + ".\n\nTem certeza que deseja enviar UMA NOVA cobrança para a " + escolaAtiva.escola + "?"
        : "Tem certeza que deseja enviar um e-mail de cobrança de atraso para a " + escolaAtiva.escola + "?";

      if (!confirm(mensagemConfirmacao)) return;
      
      var btnCobrar = document.getElementById('btn-cobrar');
      var btnReceber = document.getElementById('btn-receber');
      
      var textoOriginal = btnCobrar.innerText;
      btnCobrar.disabled = true;
      btnCobrar.innerHTML = '<span class="spinner"></span> Processando...';
      btnCobrar.style.opacity = "0.7";
      btnCobrar.style.cursor = "not-allowed";
      if(btnReceber) btnReceber.disabled = true;

      google.script.run
        .withFailureHandler(function(err) {
            alert("Erro na conexão: " + err);
            btnCobrar.innerText = textoOriginal;
            btnCobrar.disabled = false;
            btnCobrar.style.opacity = "1";
            btnCobrar.style.cursor = "pointer";
            if(btnReceber) btnReceber.disabled = false;
        })
        .withSuccessHandler(function(msg) {
            alert(msg);
            
            var hj = new Date(); 
            var strHj = ("0"+hj.getDate()).slice(-2)+"/"+("0"+(hj.getMonth()+1)).slice(-2)+"/"+hj.getFullYear()+" às "+("0"+hj.getHours()).slice(-2)+":"+("0"+hj.getMinutes()).slice(-2);
            escolaAtiva.historico = "⚠️ Cobrança disparada em " + strHj + "\n--------------------------------------------------\n" + (escolaAtiva.historico || "");
            escolaAtiva.cobrancaEnviadaEm = strHj;
            escolaAtiva.cobrancaEnviadaEmCompleta = strHj;
            
            abrirFormulario(dadosGerais.indexOf(escolaAtiva), document.querySelector('.active'));
            
            btnCobrar.innerText = textoOriginal;
            btnCobrar.disabled = false;
            btnCobrar.style.opacity = "1";
            btnCobrar.style.cursor = "pointer";
            if(btnReceber) btnReceber.disabled = false;
        })
        .enviarCobrancaBackend({
          linha: escolaAtiva.linha,
          escola: escolaAtiva.escola,
          mesAno: escolaAtiva.mesAno,
          emailUsuario: emailConferente,
          confirmarNovaCobranca: jaCobrado
        });
    }

    // --- FUNÇÃO REGISTRAR RECEBIMENTO (Com feedback visual) ---
    function registrarRecebimento() {
      var btn = document.getElementById('btn-receber'); 
      var textoOriginal = btn.innerText;
      
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Registrando...';
      btn.style.opacity = "0.7";
      btn.style.cursor = "not-allowed";

      google.script.run
        .withFailureHandler(function(err) {
            alert("Erro na conexão: " + err);
            btn.innerText = textoOriginal; 
            btn.disabled = false;
            btn.style.opacity = "1";
            btn.style.cursor = "pointer";
        })
        .withSuccessHandler(function(msg) {
            alert(msg);
            escolaAtiva.status = "RECEBIDO"; 
            atualizarLista(); 
            var elAtivo = document.querySelector('.active');
            if (perfilUsuario === 'VALIDADOR' || !elAtivo) {
              escolaAtiva = null; 
              document.getElementById('form').style.display = 'none';
            } else {
              abrirFormulario(dadosGerais.indexOf(escolaAtiva), elAtivo);
            }
            btn.innerText = textoOriginal; 
            btn.disabled = false;
            btn.style.opacity = "1";
            btn.style.cursor = "pointer";
        })
        .salvarAnaliseConferente({
          linha: escolaAtiva.linha,
          escola: escolaAtiva.escola,
          mesAno: escolaAtiva.mesAno,
          acao: "RECEBIDO",
          pendencias: escolaAtiva.pendencias,
          emailUsuario: emailConferente
        });
    }

    // --- FUNÇÃO SALVAR TUDO (Com feedback visual) ---
    function salvarTudo() {
      var selectAcao = document.getElementById('acao-select');
      var acao = selectAcao.value;
      var inputPend = document.getElementById('input-pend');
      var pend = inputPend.value;

      if (acao === "") { 
        selectAcao.classList.add('input-error'); 
        document.getElementById('alerta-acao').style.display = 'block'; 
        return; 
      }
      
      if (acao === "DEVOLVER_COM_PENDENCIAS" && pend.trim() === "") { 
        inputPend.classList.add('input-error'); 
        return alert("ERRO: Para devolver uma prestação, você precisa obrigatoriamente descrever as pendências."); 
      }

      var saldoNumerico = 0;
      if (acao === "FINALIZAR_OK") {
        var saldoTexto = document.getElementById('input-saldo').value || "";
        var apenasDigitos = saldoTexto.replace(/\D/g, ''); 
        if (apenasDigitos !== "") {
          saldoNumerico = parseInt(apenasDigitos) / 100;
        }

        if (saldoNumerico <= 0) { 
          document.getElementById('input-saldo').classList.add('input-error');
          return alert("ERRO: Por favor, digite um valor válido maior que zero para o Saldo Atual."); 
        }
      }

      var btn = document.querySelector('.btn-salvar'); 
      var textoOriginal = btn.innerText;
      
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> A enviar...';
      btn.style.opacity = "0.7";
      btn.style.cursor = "not-allowed";

      // --- LÓGICA DO ANEXO ---
      var fileInput = document.getElementById('input-anexo');
      var file = fileInput ? fileInput.files[0] : null;

      if (file) {
        var reader = new FileReader();
        reader.onload = function(e) {
          var base64 = e.target.result.split(',')[1];
          dispararParaBackend(acao, pend, saldoNumerico, base64, file.name, file.type, btn, textoOriginal);
        };
        reader.readAsDataURL(file);
      } else {
        dispararParaBackend(acao, pend, saldoNumerico, null, null, null, btn, textoOriginal);
      }
    }

    function dispararParaBackend(acao, pend, saldo, base64, nome, mime, btn, textoOriginal) {
      google.script.run
        .withFailureHandler(function(err) {
            alert("Erro na conexão: " + err);
            btn.innerText = textoOriginal; 
            btn.disabled = false;
            btn.style.opacity = "1";
            btn.style.cursor = "pointer";
        })
        .withSuccessHandler(function(msg) {
            escolaAtiva.pendencias = pend;
            if(acao === "DEVOLVER_COM_PENDENCIAS") {
              escolaAtiva.status = "DEVOLVIDO_COM_PENDENCIAS"; 
              var hj = new Date(); 
              var strHj = ("0"+hj.getDate()).slice(-2)+"/"+("0"+(hj.getMonth()+1)).slice(-2)+"/"+hj.getFullYear()+" às "+("0"+hj.getHours()).slice(-2)+":"+("0"+hj.getMinutes()).slice(-2);
              escolaAtiva.historico = "📌 Devolvido em " + strHj + ":\n" + pend + "\n--------------------------------------------------\n" + escolaAtiva.historico;
            } else if(acao === "FINALIZAR_OK") { 
              escolaAtiva.status = "FINALIZADO"; 
            }
            
            alert(msg);
            atualizarLista(); 
            var elAtivo = document.querySelector('.active');
            if (!elAtivo) {
              document.getElementById('form').style.display = 'none';
              escolaAtiva = null;
            } else {
              abrirFormulario(dadosGerais.indexOf(escolaAtiva), elAtivo);
            }
            btn.innerText = textoOriginal; 
            btn.disabled = false;
            btn.style.opacity = "1";
            btn.style.cursor = "pointer";
            
            document.getElementById('input-saldo').value = "";
            var fileInput = document.getElementById('input-anexo');
            if(fileInput) fileInput.value = ""; 
        })
        .salvarAnaliseConferente({ 
          linha: escolaAtiva.linha,
          escola: escolaAtiva.escola,
          mesAno: escolaAtiva.mesAno,
          acao: acao, 
          pendencias: pend, 
          saldoAtual: saldo, 
          emailUsuario: emailConferente,
          anexoBase64: base64,   
          anexoNome: nome,       
          anexoMime: mime        
        });
    }

    function mascaraMoeda(i) {
      var v = i.value.replace(/\D/g,'');
      v = (v/100).toFixed(2) + '';
      v = v.replace(".", ",");
      v = v.replace(/(\d)(\d{3})(\d{3}),/g, "$1.$2.$3,");
      v = v.replace(/(\d)(\d{3}),/g, "$1.$2,");
      i.value = "R$ " + v;
    }
  </script>
</body>
